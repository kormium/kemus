name: Docs

on:
  push:
    paths:
      - "**/*.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/docs.yml"

jobs:
  # Relative file links and #anchors between Markdown files. Runs offline, so a failure means a
  # genuinely broken internal link.
  internal-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check internal links and anchors
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --include-fragments --no-progress "./**/*.md"
          fail: true

  # External URLs. Non-blocking: link rot on third-party sites should not block a merge.
  external-links:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress --max-retries 2 --retry-wait-time 5 --timeout 20
            --accept 200,206,429 "./**/*.md"
          fail: false
